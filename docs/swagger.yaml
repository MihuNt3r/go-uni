basePath: /
definitions:
  handlers.errorResponse:
    properties:
      error:
        type: string
    type: object
  handlers.messageResponse:
    properties:
      message:
        type: string
    type: object
  handlers.tokenRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.tokenResponse:
    properties:
      expires_at:
        type: string
      token:
        type: string
      token_type:
        type: string
    type: object
  models.Course:
    properties:
      description:
        type: string
      id:
        type: integer
      teacher_id:
        type: integer
      title:
        type: string
    required:
    - title
    type: object
  models.CreateUpdateCourseRequest:
    properties:
      description:
        type: string
      teacher_id:
        type: integer
      title:
        type: string
    required:
    - title
    type: object
  models.CreateUpdateStudentRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
    required:
    - email
    - first_name
    - last_name
    type: object
  models.CreateUpdateTeacherRequest:
    properties:
      department:
        type: string
      first_name:
        type: string
      last_name:
        type: string
    required:
    - department
    - first_name
    - last_name
    type: object
  models.Enrollment:
    properties:
      course_id:
        type: integer
      student_id:
        type: integer
    type: object
  models.Student:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
    required:
    - email
    - first_name
    - last_name
    type: object
  models.Teacher:
    properties:
      department:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
    required:
    - department
    - first_name
    - last_name
    type: object
info:
  contact: {}
  description: University REST API for students, teachers, courses, and enrollments.
  title: go-uni API
  version: "1.0"
paths:
  /auth/token:
    post:
      consumes:
      - application/json
      description: Issues JWT token for authenticated API access.
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.tokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.tokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      summary: Issue auth token
      tags:
      - auth
  /courses:
    get:
      description: Returns all courses.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Course'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      summary: List courses
      tags:
      - courses
    post:
      consumes:
      - application/json
      description: Creates a new course.
      parameters:
      - description: Course payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateUpdateCourseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Course'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Create course
      tags:
      - courses
  /courses/{id}:
    delete:
      description: Deletes a course by ID.
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
